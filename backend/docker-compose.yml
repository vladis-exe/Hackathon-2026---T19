version: "3.8"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"

  backend:
    build: .
    env_file:
      - .env
    environment:
      - MONGO_URL=mongodb://mongo:27017/
    ports:
      - "3300:3000"
    volumes:
      - ./:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 3000 --reload
    depends_on:
      - mongo

